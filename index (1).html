<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>4학년 Lesson 4 영어 게임</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap');
  :root{
    --bg:#e3f6f5; --card:#fff; --ink:#243b40; --muted:#5d8489;
    --line:#bfe6e4; --soft:#ddf3f2; --shadow:0 8px 0 #a7dcda;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Nunito',sans-serif;color:var(--ink);min-height:100vh;
    background:radial-gradient(circle at 15% 15%,#c8f0ee 0,transparent 45%),
               radial-gradient(circle at 85% 85%,#cdeef7 0,transparent 45%),var(--bg);
    display:flex;justify-content:center;align-items:flex-start;padding:32px 16px;}
  .stage{width:100%;max-width:480px;background:var(--card);border:3px solid var(--line);
    border-radius:28px;box-shadow:var(--shadow);padding:30px 24px 32px;}
  h1{font-family:'Fredoka',sans-serif;font-size:30px;font-weight:700;text-align:center;line-height:1.3;}
  .sub{font-family:'Fredoka',sans-serif;text-align:center;color:var(--muted);font-weight:600;
    font-size:16px;margin-top:6px;margin-bottom:8px;}
  .lead{text-align:center;color:var(--muted);font-weight:700;font-size:15px;margin-bottom:22px;}
  .emoji{font-size:40px;text-align:center;display:block;margin-bottom:6px;}
  .games{display:flex;flex-direction:column;gap:14px;}
  .game{display:block;text-decoration:none;color:var(--ink);border:3px solid var(--line);
    border-radius:20px;padding:18px 18px;background:#fff;transition:transform .08s;
    border-bottom-width:6px;}
  .game:active{transform:translateY(2px);}
  .game .name{font-family:'Fredoka',sans-serif;font-size:22px;font-weight:700;display:flex;
    align-items:center;gap:10px;}
  .game .desc{font-size:14px;font-weight:700;color:var(--muted);margin-top:6px;}
  .game.matching{border-color:#9ad8d2;border-bottom-color:#69c0b8;background:#effaf9;}
  .game.quiz{border-color:#f3c98b;border-bottom-color:#e3a94f;background:#fff7ea;}
  .game.typing{border-color:#c2b6ef;border-bottom-color:#9a86e0;background:#f4f1fd;}
  .ico{font-size:26px;}
  .note{margin-top:22px;font-size:13px;font-weight:700;color:var(--muted);
    background:var(--soft);border:2px solid var(--line);border-radius:14px;padding:12px 14px;line-height:1.6;}
  .foot{text-align:center;color:var(--muted);font-size:12px;font-weight:700;margin-top:18px;}
</style>
</head>
<body>
  <main class="stage">
    <span class="emoji">🐢🦋</span>
    <h1>거북이의 특별한 하루</h1>
    <div class="sub">4학년 · Lesson 4 영어 게임</div>
    <p class="lead">하고 싶은 게임을 골라 보세요!</p>

    <div class="games">
      <a class="game matching" href="matching.html">
        <div class="name"><span class="ico">🃏</span> 짝맞추기</div>
        <div class="desc">영어와 우리말 카드를 짝지어요 · 낱말 + 표현</div>
      </a>
      <a class="game quiz" href="quiz.html">
        <div class="name"><span class="ico">📝</span> 퀴즈</div>
        <div class="desc">영어를 보고 알맞은 뜻을 골라요 · 낱말 + 표현</div>
      </a>
      <a class="game typing" href="typing.html">
        <div class="name"><span class="ico">⌨️</span> 타이핑</div>
        <div class="desc">뜻을 보고 영어 낱말을 직접 써 봐요</div>
      </a>
    </div>

    <div class="note">
      🦋 게임을 끝까지 하면 애벌레가 한 단계 자라고, 여러 번 하면 나비가 되어 날아가요.
      게임을 즐기며 Lesson 4 표현을 익혀 보세요!
    </div>
    <div class="foot">made with 🌿 for our class</div>
  </main>
</body>
</html>
